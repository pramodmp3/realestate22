<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Property Not Found | STACKLY</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 1. CSS Variables & System */
      :root {
        --primary-green: #0f4c3a;
        --dark-green: #0b3a2e;
        --medium-green: #1e6f5c;
        --mint-green: #e6f2ec;
        --dark-bg: #0e1a17;
        --text-light: #f5f5f5;
        --font-main: "Poppins", sans-serif;
        --font-heading: "Playfair Display", serif;
        --transition-speed: 0.4s;
      }

      /* 2. Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--dark-bg);
        color: var(--text-light);
        overflow: hidden; /* Prevent scroll for cinematic effect */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      /* 3. Background Image & Overlay (Requirement 2) */
      .bg-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        transform: scale(1.1); /* Initial state for GSAP zoom */
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.6),
          rgba(14, 26, 23, 0.95)
        );
        z-index: -1;
      }

      /* 4. Main Content (Mobile-First) */
      .error-section {
        width: 100%;
        padding: 2rem;
        max-width: 600px;
        opacity: 0; /* Handled by GSAP */
      }

      .error-code {
        font-family: var(--font-heading);
        font-size: clamp(5rem, 20vw, 8rem);
        line-height: 1;
        margin-bottom: 0.5rem;
        color: var(--mint-green);
        letter-spacing: -2px;
      }

      .error-title {
        font-family: var(--font-heading);
        font-size: clamp(1.5rem, 6vw, 2.5rem);
        margin-bottom: 1.5rem;
        font-weight: 700;
      }

      .error-text {
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        opacity: 0.85;
        font-weight: 300;
        letter-spacing: 0.5px;
      }

      /* 5. Button Logic (Requirement 5) */
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }

      .btn {
        position: relative;
        display: inline-block;
        padding: 1rem 2rem;
        text-decoration: none;
        color: var(--text-light);
        font-size: 0.9rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        border-radius: 4px;
        overflow: hidden;
        transition: color var(--transition-speed) ease;
        width: 100%;
        max-width: 280px;
        z-index: 1;
      }

      .btn::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        transition: var(--transition-speed) ease;
        z-index: -1;
      }

      .btn:hover::before {
        width: 100%;
      }

      .btn-primary {
        border: 2px solid var(--medium-green);
      }

      .btn-primary::before {
        background-color: var(--medium-green);
      }

      .btn-secondary {
        border: 2px solid var(--text-light);
      }

      .btn-secondary::before {
        background-color: var(--dark-green);
      }

      /* 6. Tablet & Desktop Adaptations (min-width media queries) */
      @media (min-width: 768px) {
        .button-group {
          flex-direction: row;
          justify-content: center;
        }

        .btn {
          width: auto;
        }

        .error-section {
          max-width: 800px;
        }
      }

      /* Header Logo (Optional branding) */
      .brand-logo {
        position: absolute;
        top: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-main);
        font-weight: 600;
        letter-spacing: 6px;
        font-size: 1.2rem;
        color: var(--text-light);
      }
    </style>
  </head>
  <body>
    <div class="brand-logo">STACKLY</div>

    <!-- Requirement 2 -->
    <img
      class="bg-image"
      src="./assets/404.webp"
      alt="Luxury Property Background"
      id="luxuryBg"
    />
    <div class="overlay"></div>

    <!-- Requirement 4 -->
    <section class="error-section" id="mainSection">
      <div class="content">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">This Property Is Off The Market</h2>
        <p class="error-text">
          The listing you are looking for may have been sold, leased, or
          relocated to a new address. Let us help you find your next premium
          space.
        </p>
        <div class="button-group">
          <a href="./index.html" class="btn btn-primary">Back To Home</a>
          <a href="./property.html" class="btn btn-secondary"
            >Explore Properties</a
          >
        </div>
      </div>
    </section>

    <!-- GSAP for Cinematic Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const tl = gsap.timeline();

        // 1. Fade in the background image first and slowly zoom in
        gsap.to("#luxuryBg", {
          scale: 1,
          duration: 10,
          ease: "power1.out",
        });

        // 2. Animate the main content entrance
        tl.to("#mainSection", {
          opacity: 1,
          duration: 1.5,
          ease: "power2.out",
        })
          .from(
            ".error-code",
            {
              y: 50,
              opacity: 0,
              duration: 1.2,
              ease: "power3.out",
            },
            "-=1",
          )
          .from(
            ".error-title",
            {
              y: 30,
              opacity: 0,
              duration: 1,
              ease: "power3.out",
            },
            "-=0.8",
          )
          .from(
            ".error-text",
            {
              y: 20,
              opacity: 0,
              duration: 1,
              ease: "power3.out",
            },
            "-=0.7",
          )
          .from(
            ".btn",
            {
              y: 20,
              opacity: 0,
              duration: 0.8,
              stagger: 0.2,
              ease: "power3.out",
            },
            "-=0.5",
          );

        // Optional: Subtle Mouse Parallax Effect on background
        document.addEventListener("mousemove", (e) => {
          const xPos = (e.clientX / window.innerWidth - 0.5) * 20;
          const yPos = (e.clientY / window.innerHeight - 0.5) * 20;

          gsap.to("#luxuryBg", {
            x: xPos,
            y: yPos,
            duration: 2,
            ease: "power1.out",
          });
        });
      });
    </script>
  </body>
</html>
